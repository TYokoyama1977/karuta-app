<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定 - 読み上げかるた</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { font-size: 26px; text-align: center; }
    .page-header { text-align: left; margin-bottom: 10px; }
    .home-btn {
      font-size: 18px; padding: 8px 14px;
      border-radius: 8px; border: none;
      background: #eee; cursor: pointer;
    }
    .home-btn:hover { background: #ddd; }

    .setting-item {
      margin: 20px 0;
      font-size: 18px;
    }
    input[type=range] {
      width: 100%;
    }
  </style>
</head>
<body>

<div class="page-header">
  <button class="home-btn" onclick="location.href='index.html'">🏠 ホームへ戻る</button>
</div>

<h1>設定</h1>

<div class="setting-item">
  読み上げ速度： <span id="speedValue"></span>
  <input type="range" id="speed" min="0.5" max="2" step="0.1">
</div>

<div class="setting-item">
  読み上げ間隔（秒）： <span id="intervalValue"></span>
  <input type="range" id="interval" min="1" max="10" step="1">
</div>

<div class="setting-item">
  <label>
    <input type="checkbox" id="autoPlay">
    自動再生を最初から ON にする
  </label>
</div>

<script src="settings.js"></script>

</body>
</html>
