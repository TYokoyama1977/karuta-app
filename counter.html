<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アクセスカウンター</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; }
  h1 { font-size: 24px; }
  .chart-container { width: 100%; max-width: 600px; margin-top: 30px; }
</style>
</head>
<body>

<h1>アクセスカウンター</h1>
<p id="total">読み込み中...</p>

<div class="chart-container">
  <h2>日別アクセス</h2>
  <canvas id="dailyChart"></canvas>
</div>

<div class="chart-container">
  <h2>月別アクセス</h2>
  <canvas id="monthlyChart"></canvas>
</div>

<script>
const namespace = "studio-oz";
const key = "karuta";

// 合計アクセス数
fetch(`https://api.counterapi.dev/v1/${namespace}/${key}`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("total").innerText = `合計アクセス数：${data.count}`;
  });

// 日別アクセス
fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/daily`)
  .then(res => res.json())
  .then(data => {
    const labels = data.map(item => item.date);
    const counts = data.map(item => item.count);

    new Chart(document.getElementById("dailyChart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "日別アクセス",
          data: counts,
          borderColor: "blue",
          fill: false
        }]
      }
    });
  });

// 月別アクセス
fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/monthly`)
  .then(res => res.json())
  .then(data => {
    const labels = data.map(item => item.month);
    const counts = data.map(item => item.count);

    new Chart(document.getElementById("monthlyChart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "月別アクセス",
          data: counts,
          backgroundColor: "orange"
        }]
      }
    });
  });
</script>

</body>
</html>
