<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語編集</title>
<style>
body {
    text-align: center;
    font-family: sans-serif;
    padding: 20px;
}
.genre-box {
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 15px;
    margin: 20px 0;
}
.genre-title {
    font-size: 28px;
    margin-bottom: 10px;
}
input {
    font-size: 18px;
    padding: 8px;
    margin: 5px;
}
button {
    font-size: 18px;
    padding: 8px 15px;
    margin: 5px;
    cursor: pointer;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 8px;
}
ul {
    list-style: none;
    padding: 0;
}
li {
    font-size: 22px;
    margin: 5px;
}
</style>
</head>
<body>

<h1>単語編集</h1>

<div id="genres"></div>

<button onclick="location.href='index.html'">ホームに戻る</button>

<script>
// 6ジャンルを定義
const genreList = ["動物", "数字", "体", "色", "日常品", "その他"];

// localStorage から読み込み（なければ空のジャンルを作る）
let words = JSON.parse(localStorage.getItem("wordsByGenre")) || {
    "動物": [],
    "数字": [],
    "体": [],
    "色": [],
    "日常品": [],
    "その他": []
};

// 保存
function save() {
    localStorage.setItem("wordsByGenre", JSON.stringify(words));
}

// ジャンルごとの UI を生成
function render() {
    const container = document.getElementById("genres");
    container.innerHTML = "";

    genreList.forEach(genre => {
        const box = document.createElement("div");
        box.className = "genre-box";

        // タイトル
        const title = document.createElement("div");
        title.className = "genre-title";
        title.textContent = genre;
        box.appendChild(title);

        // 単語リスト
        const ul = document.createElement("ul");
        words[genre].forEach((w, i) => {
            const li = document.createElement("li");
            li.textContent = w + " ";

            const del = document.createElement("button");
            del.textContent = "削除";
            del.onclick = () => {
                words[genre].splice(i, 1);
                save();
                render();
            };

            li.appendChild(del);
            ul.appendChild(li);
        });
        box.appendChild(ul);

        // 追加欄
        const input = document.createElement("input");
        input.placeholder = "単語を追加";
        input.id = "input-" + genre;

        const addBtn = document.createElement("button");
        addBtn.textContent = "追加";
        addBtn.onclick = () => {
            const value = input.value.trim();
            if (value) {
                words[genre].push(value);
                input.value = "";
                save();
                render();
            }
        };

        box.appendChild(input);
        box.appendChild(addBtn);

        container.appendChild(box);
    });
}

render();
</script>

</body>
</html>
