<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語編集</title>

<style>
body {
    font-family: sans-serif;
    padding: 20px;
    text-align: center;
}

/* ジャンルアイコン一覧 */
.genre-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
}

.genre-item {
    width: 120px;
    text-align: center;
    cursor: pointer;
    border-radius: 10px;
    padding: 10px;
    transition: transform 0.2s, background-color 0.2s;
    border: 2px solid transparent;
}

.genre-item:hover {
    transform: scale(1.05);
    background-color: #f0f8ff;
}

.genre-item.selected {
    border: 2px solid #4CAF50;
    background-color: #e8ffe8;
}

.genre-item img {
    width: 80px;
    height: 80px;
    border-radius: 10px;
}

.genre-label {
    font-size: 18px;
    margin-top: 8px;
    font-weight: bold;
}

/* 単語一覧 */
.word-list {
    margin-top: 20px;
}

.word-item {
    display: inline-block;
    padding: 6px 12px;
    margin: 5px;
    background-color: #f2f2f2;
    border-radius: 6px;
    font-size: 18px;
}

.delete-btn {
    margin-left: 8px;
    color: red;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>単語編集</h1>

<h2>ジャンルを選択</h2>

<div class="genre-container">
    <div class="genre-item" onclick="selectGenre('Animal')">
        <img src="images/animal_icon.png">
        <div class="genre-label">Animal</div>
    </div>
    <div class="genre-item" onclick="selectGenre('Number')">
        <img src="images/number_icon.png">
        <div class="genre-label">Number</div>
    </div>
    <div class="genre-item" onclick="selectGenre('Fruit')">
        <img src="images/fruit_icon.png">
        <div class="genre-label">Fruit</div>
    </div>
    <div class="genre-item" onclick="selectGenre('Color')">
        <img src="images/color_icon.png">
        <div class="genre-label">Color</div>
    </div>
    <div class="genre-item" onclick="selectGenre('Insect')">
        <img src="images/insect_icon.png">
        <div class="genre-label">Insect</div>
    </div>
    <div class="genre-item" onclick="selectGenre('Other')">
        <img src="images/other_icon.png">
        <div class="genre-label">Other</div>
    </div>
</div>

<h2 id="selectedTitle">ジャンルが選択されていません</h2>

<!-- 単語追加 -->
<input type="text" id="wordInput" placeholder="単語を入力" style="font-size:20px; padding:5px;">
<button onclick="addWord()" style="font-size:20px;">追加</button>

<!-- 単語一覧 -->
<div id="wordList" class="word-list"></div>

<br><br>
<a href="index.html">ホームに戻る</a>

<script>
// 6ジャンルの初期データ
let words = JSON.parse(localStorage.getItem("words")) || {
    "Animal": [],
    "Number": [],
    "Fruit": [],
    "Color": [],
    "Insect": [],
    "Other": []
};

let selectedGenre = null;

// ジャンル選択
function selectGenre(genre) {
    selectedGenre = genre;
    document.getElementById("selectedTitle").textContent = genre + " の単語";

    // 選択枠の更新
    document.querySelectorAll(".genre-item").forEach(item => item.classList.remove("selected"));
    event.currentTarget.classList.add("selected");

    displayWords();
}

// 単語追加
function addWord() {
    if (!selectedGenre) {
        alert("先にジャンルを選択してください");
        return;
    }

    const input = document.getElementById("wordInput");
    const word = input.value.trim();

    if (word === "") return;

    words[selectedGenre].push(word);
    localStorage.setItem("words", JSON.stringify(words));

    input.value = "";
    displayWords();
}

// 単語一覧表示
function displayWords() {
    const list = document.getElementById("wordList");
    list.innerHTML = "";

    if (!selectedGenre) return;

    words[selectedGenre].forEach((w, index) => {
        const item = document.createElement("div");
        item.className = "word-item";
        item.innerHTML = `${w} <span class="delete-btn" onclick="deleteWord(${index})">×</span>`;
        list.appendChild(item);
    });
}

// 単語削除
function deleteWord(index) {
    words[selectedGenre].splice(index, 1);
    localStorage.setItem("words", JSON.stringify(words));
    displayWords();
}
</script>

</body>
</html>
