<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>単語編集 v1</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; }
    h1 { margin-bottom: 8px; }
    label { display: block; margin-top: 8px; }
    input, select, button { margin-top: 4px; }
    table { border-collapse: collapse; margin-top: 16px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; text-align: left; }
    .row-actions button { margin-right: 4px; }
  </style>
</head>
<body>
  <h1>単語編集（v1）</h1>
  <a href="index.html">ホームに戻る</a>

  <!-- カテゴリ選択 -->
  <section>
    <h2>カテゴリ選択</h2>
    <label>
      カテゴリ:
      <select id="categorySelect">
        <option value="animal">animal</option>
        <option value="fruit">fruit</option>
        <option value="color">color</option>
      </select>
    </label>
    <button id="loadWordsBtn">このカテゴリの単語を読み込む</button>
  </section>

  <!-- 単語一覧 -->
  <section>
    <h2>単語一覧</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>英単語</th>
          <th>日本語</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="wordsTableBody">
        <!-- JSで埋める -->
      </tbody>
    </table>
  </section>

  <!-- 単語追加・編集フォーム -->
  <section>
    <h2>単語追加 / 編集</h2>
    <input type="hidden" id="editingId" />

    <label>
      英単語:
      <input type="text" id="wordInput" />
    </label>
    <label>
      日本語:
      <input type="text" id="meaningInput" />
    </label>

    <button id="saveWordBtn">保存（v1）</button>
    <button id="cancelEditBtn">編集キャンセル</button>
  </section>

  <script>
    // ★ v1 API のベースURL（必要に応じて書き換えてください）
    const API_BASE = '/v1/words';

    const categorySelect = document.getElementById('categorySelect');
    const loadWordsBtn = document.getElementById('loadWordsBtn');
    const wordsTableBody = document.getElementById('wordsTableBody');
    const editingIdInput = document.getElementById('editingId');
    const wordInput = document.getElementById('wordInput');
    const meaningInput = document.getElementById('meaningInput');
    const saveWordBtn = document.getElementById('saveWordBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    // 単語一覧取得（v1）
    async function loadWords() {
      const category = categorySelect.value;
      wordsTableBody.innerHTML = '<tr><td colspan="4">読み込み中...</td></tr>';

      try {
        const res = await fetch(`${API_BASE}?category=${encodeURIComponent(category)}`);
        if (!res.ok) throw new Error('API error: ' + res.status);
        const data = await res.json(); // 例: [{id, word, meaning, category}, ...]

        renderWords(data);
      } catch (e) {
        console.error(e);
        wordsTableBody.innerHTML =
          '<tr><td colspan="4">読み込みに失敗しました（v1）。コンソールを確認してください。</td></tr>';
      }
    }

    function renderWords(words) {
      if (!Array.isArray(words) || words.length === 0) {
        wordsTableBody.innerHTML = '<tr><td colspan="4">このカテゴリには単語がありません。</td></tr>';
        return;
      }

      wordsTableBody.innerHTML = '';
      words.forEach(w => {
        const tr = document.createElement('tr');

        const tdId = document.createElement('td');
        tdId.textContent = w.id ?? '';
        tr.appendChild(tdId);

        const tdWord = document.createElement('td');
        tdWord.textContent = w.word ?? '';
        tr.appendChild(tdWord);

        const tdMeaning = document.createElement('td');
        tdMeaning.textContent = w.meaning ?? '';
        tr.appendChild(tdMeaning);

        const tdActions = document.createElement('td');
        tdActions.className = 'row-actions';

        const editBtn = document.createElement('button');
        editBtn.textContent = '編集';
        editBtn.onclick = () => startEdit(w);
        tdActions.appendChild(editBtn);

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = '削除';
        deleteBtn.onclick = () => deleteWord(w.id);
        tdActions.appendChild(deleteBtn);

        tr.appendChild(tdActions);
        wordsTableBody.appendChild(tr);
      });
    }

    function startEdit(wordObj) {
      editingIdInput.value = wordObj.id ?? '';
      wordInput.value = wordObj.word ?? '';
      meaningInput.value = wordObj.meaning ?? '';
    }

    function clearForm() {
      editingIdInput.value = '';
      wordInput.value = '';
      meaningInput.value = '';
    }

    // 単語保存（追加 or 更新）v1
    async function saveWord() {
      const id = editingIdInput.value;
      const category = categorySelect.value;
      const word = wordInput.value.trim();
      const meaning = meaningInput.value.trim();

      if (!word || !meaning) {
        alert('英単語と日本語を入力してください。');
        return;
      }

      const payload = { id: id || undefined, word, meaning, category };

      try {
        const res = await fetch(API_BASE, {
          method: id ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error('API error: ' + res.status);

        clearForm();
        await loadWords(); // 更新後に再読み込み
      } catch (e) {
        console.error(e);
        alert('保存（v1）に失敗しました。コンソールを確認してください。');
      }
    }

    // 単語削除 v1
    async function deleteWord(id) {
      if (!id) return;
      if (!confirm('この単語を削除しますか？')) return;

      try {
        const res = await fetch(`${API_BASE}/${encodeURIComponent(id)}`, {
          method: 'DELETE',
        });
        if (!res.ok) throw new Error('API error: ' + res.status);

        await loadWords();
      } catch (e) {
        console.error(e);
        alert('削除（v1）に失敗しました。コンソールを確認してください。');
      }
    }

    // イベント設定
    loadWordsBtn.addEventListener('click', loadWords);
    saveWordBtn.addEventListener('click', saveWord);
    cancelEditBtn.addEventListener('click', clearForm);

    // 初期表示：デフォルトカテゴリを読み込み
    loadWords();
  </script>
</body>
</html>
