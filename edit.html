<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語編集</title>
<style>
    body {
        font-family: sans-serif;
        padding: 20px;
    }

    h2 {
        margin-top: 0;
    }

    /* アイコンボタン */
    .genre-icons {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
    }
    .genre-icons img {
        width: 70px;
        height: 70px;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .genre-icons img:hover {
        transform: scale(1.1);
    }

    /* 単語タグ表示 */
    .word-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0;
    }
    .word-item {
        display: flex;
        align-items: center;
        background: #f2f2f2;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 16px;
    }
    .word-item button {
        margin-left: 6px;
        padding: 2px 6px;
        font-size: 14px;
    }

    #homeBtn {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 8px 12px;
        font-size: 14px;
    }
</style>
</head>
<body>

<h2>単語編集</h2>

<!-- ホームボタン -->
<button id="homeBtn" onclick="location.href='index.html'">ホームに戻る</button>

<!-- アイコン選択 -->
<div class="genre-icons">
    <img src="images/animal_icon.png" onclick="selectGenre('Animal')">
    <img src="images/number_icon.png" onclick="selectGenre('Number')">
    <img src="images/fruit_icon.png" onclick="selectGenre('Fruit')">
    <img src="images/color_icon.png" onclick="selectGenre('Color')">
    <img src="images/insect_icon.png" onclick="selectGenre('Insect')">
    <img src="images/other_icon.png" onclick="selectGenre('Other')">
</div>

<h3 id="genreTitle">ジャンルを選択</h3>

<!-- 単語一覧 -->
<div id="wordList"></div>

<!-- 単語追加 -->
<input type="text" id="wordInput" placeholder="単語を入力">
<button onclick="addWord()">追加</button>

<script>
    // ローカルストレージから読み込み
    let words = JSON.parse(localStorage.getItem("words")) || {
        Animal: [],
        Number: [],
        Fruit: [],
        Color: [],
        Insect: [],
        Other: []
    };

    let currentGenre = null;

    function selectGenre(genre) {
        currentGenre = genre;
        document.getElementById("genreTitle").textContent = genre + " の単語";
        updateWordList();
    }

    function updateWordList() {
        const container = document.getElementById("wordList");
        container.innerHTML = "";

        if (!currentGenre) return;

        const list = document.createElement("div");
        list.className = "word-list";

        words[currentGenre].forEach((w, index) => {
            const item = document.createElement("div");
            item.className = "word-item";

            const text = document.createElement("span");
            text.textContent = w;

            const delBtn = document.createElement("button");
            delBtn.textContent = "削除";
            delBtn.onclick = () => deleteWord(index);

            item.appendChild(text);
            item.appendChild(delBtn);
            list.appendChild(item);
        });

        container.appendChild(list);
    }

    function addWord() {
        if (!currentGenre) return alert("ジャンルを選択してください");

        const input = document.getElementById("wordInput");
        const newWord = input.value.trim();
        if (newWord === "") return;

        words[currentGenre].push(newWord);
        input.value = "";

        saveWords();
        updateWordList();
    }

    function deleteWord(index) {
        words[currentGenre].splice(index, 1);
        saveWords();
        updateWordList();
    }

    function saveWords() {
        localStorage.setItem("words", JSON.stringify(words));
    }
</script>

</body>
</html>
