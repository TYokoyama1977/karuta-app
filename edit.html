<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>単語編集</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        h2 {
            margin-top: 30px;
        }

        /* 横並びタグ表示 */
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0 20px;
        }

        .word-item {
            display: flex;
            align-items: center;
            background: #f2f2f2;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 16px;
        }

        .word-item button {
            margin-left: 6px;
            padding: 2px 6px;
            font-size: 14px;
        }

        .genre-box {
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<h1>単語編集</h1>

<p>ジャンルを選んで単語を追加できます。</p>

<select id="genreSelect">
    <option value="動物">動物</option>
    <option value="数字">数字</option>
    <option value="体">体</option>
    <option value="色">色</option>
    <option value="日常品">日常品</option>
    <option value="その他">その他</option>
</select>

<input type="text" id="wordInput" placeholder="単語を入力">
<button onclick="addWord()">追加</button>

<hr>

<div id="wordList"></div>

<script>
    // 6ジャンル固定
    const defaultWords = {
        "動物": [],
        "数字": [],
        "体": [],
        "色": [],
        "日常品": [],
        "その他": []
    };

    // localStorage から読み込み
    let words = JSON.parse(localStorage.getItem("words")) || defaultWords;

    // 単語追加
    function addWord() {
        const genre = document.getElementById("genreSelect").value;
        const word = document.getElementById("wordInput").value.trim();

        if (word === "") return;

        words[genre].push(word);
        document.getElementById("wordInput").value = "";

        saveWords();
        updateWordList();
    }

    // 単語削除
    function deleteWord(genre, index) {
        words[genre].splice(index, 1);
        saveWords();
        updateWordList();
    }

    // 保存
    function saveWords() {
        localStorage.setItem("words", JSON.stringify(words));
    }

    // 表示更新（横並びタグ表示）
    function updateWordList() {
        const container = document.getElementById("wordList");
        container.innerHTML = "";

        for (let genre in words) {
            const genreBox = document.createElement("div");
            genreBox.className = "genre-box";

            const title = document.createElement("h2");
            title.textContent = genre;
            genreBox.appendChild(title);

            const list = document.createElement("div");
            list.className = "word-list";

            words[genre].forEach((w, index) => {
                const item = document.createElement("div");
                item.className = "word-item";

                const text = document.createElement("span");
                text.textContent = w;

                const delBtn = document.createElement("button");
                delBtn.textContent = "削除";
                delBtn.onclick = () => deleteWord(genre, index);

                item.appendChild(text);
                item.appendChild(delBtn);
                list.appendChild(item);
            });

            genreBox.appendChild(list);
            container.appendChild(genreBox);
        }
    }

    updateWordList();
</script>

</body>
</html>
