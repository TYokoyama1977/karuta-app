<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>単語編集</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { border-bottom: 1px solid #ccc; padding: 6px; }
        button { padding: 5px 10px; }
    </style>
</head>
<body>

<h2>単語編集（最大20個）</h2>

<select id="genreSelect" onchange="renderWordList()">
    <option value="number">Number</option>
    <option value="animal">Animal</option>
    <option value="fruit">Fruit</option>
    <option value="color">Color</option>
    <option value="insect">Insect</option>
    <option value="other">Other</option>
</select>

<div id="wordList"></div>

<input type="text" id="newWord" placeholder="単語を入力">
<button onclick="addWord()">追加</button>

<br><br>
<a href="index.html">ホームに戻る</a>

<script>
const APP_VERSION = "1.0.0";

const initialWords = {
    number: ["one","two","three","four","five","six","seven","eight","nine","ten"],
    animal: ["dog","cat","rabbit","lion","elephant","giraffe","bear","monkey","horse","sheep","gorilla"],
    fruit: ["orange","apple","strawberry","pineapple","banana","peach","grape","watermelon","cherry"],
    color: ["black","white","red","blue","yellow","green","pink","purple","brown","orange"],
    insect: ["butterfly","ant","bee","ladybug","beetle","cicada","dragonfly","grasshopper"],
    other: ["car","bus","table","chair","house","clock","train","food","drink"]
};

let words = {};

function loadData() {
    const saved = JSON.parse(localStorage.getItem("words"));
    const savedVersion = localStorage.getItem("version");

    if (!saved || savedVersion !== APP_VERSION) {
        words = JSON.parse(JSON.stringify(initialWords));
        localStorage.setItem("words", JSON.stringify(words));
        localStorage.setItem("version", APP_VERSION);
    } else {
        words = saved;
    }

    // 誤字修正
    if (words.animal) {
        const idx = words.animal.indexOf("golira");
        if (idx !== -1) {
            words.animal[idx] = "gorilla";
            localStorage.setItem("words", JSON.stringify(words));
        }
    }
}

function renderWordList() {
    const listArea = document.getElementById("wordList");
    listArea.innerHTML = "";

    const genre = document.getElementById("genreSelect").value;
    const list = words[genre];

    const countText = document.createElement("div");
    countText.textContent = `現在 ${list.length} / 20 個`;
    countText.style.fontWeight = "bold";
    listArea.appendChild(countText);

    const table = document.createElement("table");

    list.forEach((word, index) => {
        const row = document.createElement("tr");

        const noCell = document.createElement("td");
        noCell.textContent = index + 1;
        row.appendChild(noCell);

        const wordCell = document.createElement("td");
        wordCell.textContent = word;
        row.appendChild(wordCell);

        const actionCell = document.createElement("td");

        const delBtn = document.createElement("button");
        delBtn.textContent = "削除";
        delBtn.onclick = () => deleteWord(genre, index);

        actionCell.appendChild(delBtn);
        row.appendChild(actionCell);

        table.appendChild(row);
    });

    listArea.appendChild(table);
}

function addWord() {
    const genre = document.getElementById("genreSelect").value;
    const newWord = document.getElementById("newWord").value.trim();

    if (!newWord) return;

    if (words[genre].length >= 20) {
        alert("21個目は登録できません");
        return;
    }

    words[genre].push(newWord);
    localStorage.setItem("words", JSON.stringify(words));
    document.getElementById("newWord").value = "";
    renderWordList();
}

function deleteWord(genre, index) {
    words[genre].splice(index, 1);
    localStorage.setItem("words", JSON.stringify(words));
    renderWordList();
}

loadData();
renderWordList();
</script>

</body>
</html>
