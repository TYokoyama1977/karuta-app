<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>単語編集</title>
    <style>
        body {
            font-family: "Arial Rounded MT Bold", Arial;
            padding: 20px;
            background: #fff7e6;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        /* ホームボタン */
        .home-btn {
            display: inline-block;
            padding: 10px 15px;
            background: #4da6ff;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* ジャンルボタン */
        .genre-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .genre-btn {
            padding: 10px 15px;
            background: #ffb84d;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .genre-btn.active {
            background: #ff8c42;
            color: white;
        }

        /* 単語リスト */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        td {
            border-bottom: 1px solid #ccc;
            padding: 8px;
            font-size: 18px;
        }

        button {
            padding: 5px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .delete-btn {
            background: #ff6666;
            color: white;
        }

        .add-area {
            margin-top: 20px;
            text-align: center;
        }

        input {
            padding: 8px;
            font-size: 16px;
            width: 200px;
        }

        .add-btn {
            padding: 8px 15px;
            background: #4da6ff;
            color: white;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .genre-title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 ホームに戻る</a>

<h2>単語編集（最大20個）</h2>

<!-- ジャンルボタン -->
<div class="genre-buttons">
    <button class="genre-btn" onclick="changeGenre('number')">Number</button>
    <button class="genre-btn" onclick="changeGenre('animal')">Animal</button>
    <button class="genre-btn" onclick="changeGenre('fruit')">Fruit</button>
    <button class="genre-btn" onclick="changeGenre('color')">Color</button>
    <button class="genre-btn" onclick="changeGenre('insect')">Insect</button>
    <button class="genre-btn" onclick="changeGenre('other')">Other</button>
</div>

<!-- 現在のジャンル名 -->
<div id="genreTitle" class="genre-title">Number の単語リスト</div>

<!-- 単語リスト -->
<div id="wordList"></div>

<!-- 追加エリア -->
<div class="add-area">
    <input type="text" id="newWord" placeholder="単語を入力">
    <button class="add-btn" onclick="addWord()">追加</button>
</div>

<script>
const APP_VERSION = "1.0.0";

const initialWords = {
    number: ["one","two","three","four","five","six","seven","eight","nine","ten"],
    animal: ["dog","cat","rabbit","lion","elephant","giraffe","bear","monkey","horse","sheep","gorilla"],
    fruit: ["orange","apple","strawberry","pineapple","banana","peach","grape","watermelon","cherry"],
    color: ["black","white","red","blue","yellow","green","pink","purple","brown","orange"],
    insect: ["butterfly","ant","bee","ladybug","beetle","cicada","dragonfly","grasshopper"],
    other: ["car","bus","table","chair","house","clock","train","food","drink"]
};

let words = {};
let currentGenre = "number";

function loadData() {
    const saved = JSON.parse(localStorage.getItem("words"));
    const savedVersion = localStorage.getItem("version");

    if (!saved || savedVersion !== APP_VERSION) {
        words = JSON.parse(JSON.stringify(initialWords));
        localStorage.setItem("words", JSON.stringify(words));
        localStorage.setItem("version", APP_VERSION);
    } else {
        words = saved;
    }

    // 誤字修正
    if (words.animal) {
        const idx = words.animal.indexOf("golira");
        if (idx !== -1) {
            words.animal[idx] = "gorilla";
            localStorage.setItem("words", JSON.stringify(words));
        }
    }
}

function changeGenre(genre) {
    currentGenre = genre;

    document.querySelectorAll(".genre-btn").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    document.getElementById("genreTitle").textContent =
        `${genre.charAt(0).toUpperCase() + genre.slice(1)} の単語リスト`;

    renderWordList();
}

function renderWordList() {
    const listArea = document.getElementById("wordList");
    listArea.innerHTML = "";

    const list = words[currentGenre];

    const countText = document.createElement("div");
    countText.textContent = `現在 ${list.length} / 20 個`;
    countText.style.fontWeight = "bold";
    countText.style.marginBottom = "10px";
    listArea.appendChild(countText);

    const table = document.createElement("table");

    list.forEach((word, index) => {
        const row = document.createElement("tr");

        const noCell = document.createElement("td");
        noCell.textContent = index + 1;
        row.appendChild(noCell);

        const wordCell = document.createElement("td");
        wordCell.textContent = word;
        row.appendChild(wordCell);

        const actionCell = document.createElement("td");
        const delBtn = document.createElement("button");
        delBtn.textContent = "削除";
        delBtn.className = "delete-btn";
        delBtn.onclick = () => deleteWord(index);

        actionCell.appendChild(delBtn);
        row.appendChild(actionCell);

        table.appendChild(row);
    });

    listArea.appendChild(table);
}

function addWord() {
    const newWord = document.getElementById("newWord").value.trim();
    if (!newWord) return;

    if (words[currentGenre].length >= 20) {
        alert("21個目は登録できません");
        return;
    }

    words[currentGenre].push(newWord);
    localStorage.setItem("words", JSON.stringify(words));
    document.getElementById("newWord").value = "";
    renderWordList();
}

function deleteWord(index) {
    words[currentGenre].splice(index, 1);
    localStorage.setItem("words", JSON.stringify(words));
    renderWordList();
}

loadData();
changeGenre("number");
</script>

</body>
</html>
