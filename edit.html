<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>単語編集</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; }
    h1 { margin-bottom: 8px; }
    label { display: block; margin-top: 8px; }
    input, select, button { margin-top: 4px; }
    table { border-collapse: collapse; margin-top: 16px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; text-align: left; }
    .row-actions button { margin-right: 4px; }
  </style>
</head>
<body>
  <h1>単語編集</h1>
  <a href="index.html">ホームに戻る</a>

  <!-- カテゴリ選択 -->
  <section>
    <h2>カテゴリ選択</h2>
    <label>
      カテゴリ:
      <select id="categorySelect">
        <option value="number">Number</option>
        <option value="animal">Animal</option>
        <option value="fruit">Fruit</option>
        <option value="color">Color</option>
        <option value="insect">Insect</option>
        <option value="other">Other</option>
      </select>
    </label>
    <button id="loadWordsBtn">このカテゴリの単語を読み込む</button>
  </section>

  <!-- 単語一覧 -->
  <section>
    <h2>単語一覧</h2>
    <table>
      <thead>
        <tr>
          <th>英単語</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="wordsTableBody"></tbody>
    </table>
  </section>

  <!-- 単語追加・編集フォーム -->
  <section>
    <h2>単語追加 / 編集</h2>
    <input type="hidden" id="editingIndex" />

    <label>
      英単語:
      <input type="text" id="wordInput" />
    </label>

    <button id="saveWordBtn">保存</button>
    <button id="cancelEditBtn">編集キャンセル</button>
  </section>

  <script>
    const STORAGE_KEY = "words";

    // ★ localStorage の自動初期化
    function loadStorage() {
      let data = null;

      try {
        data = JSON.parse(localStorage.getItem(STORAGE_KEY));
      } catch (e) {
        console.warn("localStorage が壊れていたため初期化します");
      }

      // データが無い or 壊れている場合は初期化
      if (!data || typeof data !== "object") {
        data = {
          number: [],
          animal: ["dog", "cat"],
          fruit: [],
          color: [],
          insect: [],
          other: []
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      // カテゴリが欠けていたら補完
      const categories = ["number", "animal", "fruit", "color", "insect", "other"];
      categories.forEach(cat => {
        if (!Array.isArray(data[cat])) data[cat] = [];
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      return data;
    }

    function saveStorage(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    const categorySelect = document.getElementById("categorySelect");
    const loadWordsBtn = document.getElementById("loadWordsBtn");
    const wordsTableBody = document.getElementById("wordsTableBody");
    const editingIndexInput = document.getElementById("editingIndex");
    const wordInput = document.getElementById("wordInput");
    const saveWordBtn = document.getElementById("saveWordBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    function loadWords() {
      const category = categorySelect.value;
      const data = loadStorage();
      const words = data[category];

      if (words.length === 0) {
        wordsTableBody.innerHTML = '<tr><td colspan="2">単語がありません。</td></tr>';
        return;
      }

      wordsTableBody.innerHTML = "";
      words.forEach((word, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${word}</td>
          <td class="row-actions">
            <button onclick="startEdit(${index})">編集</button>
            <button onclick="deleteWord(${index})">削除</button>
          </td>
        `;

        wordsTableBody.appendChild(tr);
      });
    }

    function startEdit(index) {
      const category = categorySelect.value;
      const data = loadStorage();
      const words = data[category];

      editingIndexInput.value = index;
      wordInput.value = words[index];
    }

    function clearForm() {
      editingIndexInput.value = "";
      wordInput.value = "";
    }

    function saveWord() {
      const category = categorySelect.value;
      const data = loadStorage();
      const words = data[category];

      const word = wordInput.value.trim();
      if (!word) {
        alert("英単語を入力してください。");
        return;
      }

      const index = editingIndexInput.value;

      if (index === "") {
        words.push(word);
      } else {
        words[index] = word;
      }

      saveStorage(data);
      clearForm();
      loadWords();
    }

    function deleteWord(index) {
      const category = categorySelect.value;
      const data = loadStorage();
      const words = data[category];

      if (!confirm("この単語を削除しますか？")) return;

      words.splice(index, 1);
      saveStorage(data);
      loadWords();
    }

    loadWordsBtn.addEventListener("click", loadWords);
    saveWordBtn.addEventListener("click", saveWord);
    cancelEditBtn.addEventListener("click", clearForm);

    loadWords();
  </script>
</body>
</html>
