<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イラスト集 - 英語かるたアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Arial", sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #fff;
    }

    .illust-header {
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f7f7f7;
    }

    .home-btn {
      font-size: 18px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #eee;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    .nav {
      margin-bottom: 10px;
    }

    .nav button {
      margin: 2px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    .nav button.active {
      background: #ffcc66;
    }

    .page {
      display: none;
      page-break-after: always;
    }

    .page.active {
      display: block;
    }

    .card-grid {
      width: 100%;
      max-width: 800px;
      margin: 0 auto 20px auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 200px;
      gap: 10px;
    }

    .card {
      border: 1px solid #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 20px;
    }

    .card .word {
      margin-top: 10px;
      font-size: 22px;
    }

    @media print {
      .illust-header, .nav {
        display: none;
      }
      body {
        margin: 0;
      }
      .page {
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="illust-header">
    <button class="home-btn" onclick="goHome()">🏠 ホームに戻る</button>
    <span>イラストを印刷してカルタを作ろう</span>
  </div>

  <h1>イラスト集</h1>

  <div class="nav" id="nav"></div>

  <div id="pages"></div>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }

    // 印刷用データ（初期単語と同じ構成）
    const data = {
      "Number 1-8": ["one","two","three","four","five","six","seven","eight"],
      "Number 9-12": ["nine","ten","eleven","twelve"],
      "Animal": ["dog","cat","bird","fish","rabbit","bear","lion","horse"],
      "Fruit": ["apple","banana","orange","grape","peach","lemon","melon","strawberry"],
      "Color": ["red","blue","yellow","green","black","white","pink","purple"],
      "Insect": ["ant","bee","butterfly","beetle","spider","dragonfly","ladybug","grasshopper"],
      "Other": ["car","house","book","chair","clock","cup","ball","star"],
      "Food": ["bread","rice","milk","egg","soup","cake","cheese","juice"],
      "Body": ["head","hand","foot","eye","ear","nose","mouth","hair"]
    };

    const pagesContainer = document.getElementById("pages");
    const nav = document.getElementById("nav");

    let pageIndex = 0;
    const pageKeys = Object.keys(data);

    pageKeys.forEach((key, idx) => {
      const btn = document.createElement("button");
      btn.textContent = key;
      btn.addEventListener("click", () => {
        pageIndex = idx;
        updatePage();
      });
      nav.appendChild(btn);

      const pageDiv = document.createElement("div");
      pageDiv.className = "page";

      const grid = document.createElement("div");
      grid.className = "card-grid";

      data[key].forEach(word => {
        const card = document.createElement("div");
        card.className = "card";

        // ここに後でイラスト画像を入れる想定
        const dummy = document.createElement("div");
        dummy.textContent = "イラスト";
        dummy.style.fontSize = "18px";

        const w = document.createElement("div");
        w.className = "word";
        w.textContent = word;

        card.appendChild(dummy);
        card.appendChild(w);
        grid.appendChild(card);
      });

      pageDiv.appendChild(grid);
      pagesContainer.appendChild(pageDiv);
    });

    function updatePage() {
      const pageElems = document.querySelectorAll(".page");
      const navBtns = nav.querySelectorAll("button");
      pageElems.forEach(p => p.classList.remove("active"));
      navBtns.forEach(b => b.classList.remove("active"));

      pageElems[pageIndex].classList.add("active");
      navBtns[pageIndex].classList.add("active");
    }

    // 初期表示
    updatePage();
  </script>

</body>
</html>
