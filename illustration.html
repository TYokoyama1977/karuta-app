<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イラスト集 - 英語かるたアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Arial", sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #fff;
    }

    /* 画面上のヘッダー（印刷時は非表示） */
    .illust-header {
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f7f7f7;
    }

    .home-btn {
      font-size: 18px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #eee;
      cursor: pointer;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    .nav {
      margin-bottom: 10px;
    }

    .nav button {
      margin: 2px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #ddd;
      cursor: pointer;
    }

    .nav button.active {
      background: #ffcc66;
    }

    /* ページ切り替え */
    .page {
      display: none;
      page-break-after: always;
    }

    .page.active {
      display: block;
    }

    /* ★ カルタカード（9cm × 6cm） */
    .card-grid {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 20px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 9cm;
      height: 6cm;
      border: 2px solid #000;
      border-radius: 8px;
      margin: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      page-break-inside: avoid;
    }

    .card img {
      max-width: 80%;
      max-height: 70%;
    }

    .card .word {
      margin-top: 6px;
      font-size: 22px;
    }

    /* ★ 印刷時はメニューを非表示にする */
    @media print {
      .illust-header,
      .nav,
      h1 {
        display: none !important;
      }
      body {
        margin: 0;
      }
      .page {
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <div class="illust-header">
    <button class="home-btn" onclick="goHome()">🏠 ホームに戻る</button>
    <span>イラストを印刷してカルタを作ろう</span>
  </div>

  <h1>イラスト集</h1>

  <div class="nav" id="nav"></div>

  <div id="pages"></div>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }

    /* ★ 印刷用データ（アプリと完全一致） */
    const data = {
      "Number 1-8": ["one","two","three","four","five","six","seven","eight"],
      "Number 9-12": ["nine","ten","eleven","twelve"],
      "Animal": ["dog","cat","bird","fish","rabbit","bear","lion","horse"],
      "Color": ["red","blue","yellow","green","black","white","pink","purple"],
      "Food": ["bread","rice","milk","egg","soup","cake","cheese","juice"],
      "Fruit": ["apple","banana","orange","grape","peach","lemon","melon","strawberry"],
      "Body": ["head","hand","foot","eye","ear","nose","mouth","hair"],
      "Insect": ["ant","bee","butterfly","beetle","spider","dragonfly","ladybug","grasshopper"],
      "Other": ["car","house","book","chair","clock","cup","ball","star"]
    };

    const pagesContainer = document.getElementById("pages");
    const nav = document.getElementById("nav");

    let pageIndex = 0;
    const pageKeys = Object.keys(data);

    /* ★ ページ生成 */
    pageKeys.forEach((key, idx) => {
      const btn = document.createElement("button");
      btn.textContent = key;
      btn.addEventListener("click", () => {
        pageIndex = idx;
        updatePage();
      });
      nav.appendChild(btn);

      const pageDiv = document.createElement("div");
      pageDiv.className = "page";

      const grid = document.createElement("div");
      grid.className = "card-grid";

      data[key].forEach(word => {
        const card = document.createElement("div");
        card.className = "card";

        /* ★ イラスト画像を読み込む（img/word.png） */
        const img = document.createElement("img");
        img.src = `img/${word}.png`;
        img.alt = word;

        const w = document.createElement("div");
        w.className = "word";
        w.textContent = word;

        card.appendChild(img);
        card.appendChild(w);
        grid.appendChild(card);
      });

      pageDiv.appendChild(grid);
      pagesContainer.appendChild(pageDiv);
    });

    function updatePage() {
      const pageElems = document.querySelectorAll(".page");
      const navBtns = nav.querySelectorAll("button");
      pageElems.forEach(p => p.classList.remove("active"));
      navBtns.forEach(b => b.classList.remove("active"));

      pageElems[pageIndex].classList.add("active");
      navBtns[pageIndex].classList.add("active");
    }

    /* 初期表示 */
    updatePage();
  </script>

</body>
</html>
