<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イラスト集</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Arial", sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #fff;
    }

    .illust-header {
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f7f7f7;
    }

    .home-btn {
      font-size: 18px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #eee;
      cursor: pointer;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    .nav button {
      margin: 4px;
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #ddd;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="illust-header">
    <button class="home-btn" onclick="goHome()">🏠 ホームに戻る</button>
    <span>ジャンルを選んで印刷ページへ</span>
  </div>

  <h1>イラスト集</h1>

  <div class="nav" id="nav"></div>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }

    const data = {
      "Number": ["one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve"],
      "Animal": ["dog","cat","bird","fish","rabbit","bear","lion","horse"],
      "Color": ["red","blue","yellow","green","black","white","pink","purple"],
      "Food": ["bread","rice","milk","egg","soup","cake","cheese","juice"],
      "Fruit": ["apple","banana","orange","grape","peach","lemon","melon","strawberry"],
      "Body": ["head","hand","foot","eye","ear","nose","mouth","hair"],
      "Insect": ["ant","bee","butterfly","beetle","spider","dragonfly","ladybug","grasshopper"],
      "Other": ["car","house","book","chair","clock","cup","ball","star"]
    };

    const nav = document.getElementById("nav");
    const keys = Object.keys(data);

    keys.forEach(key => {
      const btn = document.createElement("button");
      btn.textContent = key;
      btn.addEventListener("click", () => {
        window.location.href = `print.html?genre=${encodeURIComponent(key)}`;
      });
      nav.appendChild(btn);
    });
  </script>

</body>
</html>
