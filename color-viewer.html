<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Color カード PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      background: #f7f7f7;
      font-family: "Arial", sans-serif;
    }

    .no-print {
      margin: 10px;
    }

    @media print {
      .no-print {
        display: none;
      }
      body {
        margin: 0;
        padding: 0;
      }
    }

    iframe {
      width: 100%;
      height: 95vh;
      border: none;
    }
  </style>
</head>

<body>

  <button class="no-print" onclick="history.back()">← 戻る</button>

  <iframe src="pdf/color.pdf"></iframe>

</body>
</html>
