<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アクセスカウンター</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .count-box {
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    canvas {
      max-width: 600px;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <h1>アクセスカウンター</h1>

  <div class="count-box" id="totalCount">読み込み中...</div>

  <h2>日別アクセス</h2>
  <canvas id="dailyChart"></canvas>

  <h2>月別アクセス</h2>
  <canvas id="monthlyChart"></canvas>

  <script>
    const BASE = "https://api.counterapi.dev/v1/studio-oz/karuta";

    // 総アクセス数
    fetch(BASE)
      .then(res => res.json())
      .then(data => {
        document.getElementById("totalCount").textContent =
          "総アクセス数：" + data.count + " 回";
      });

    // 日別グラフ
    fetch(BASE + "/history/day")
      .then(res => res.json())
      .then(data => {
        const labels = data.map(d => d.date);
        const counts = data.map(d => d.count);

        new Chart(document.getElementById("dailyChart"), {
          type: "line",
          data: {
            labels: labels,
            datasets: [{
              label: "日別アクセス数",
              data: counts,
              borderColor: "blue",
              fill: false
            }]
          }
        });
      });

    // 月別グラフ
    fetch(BASE + "/history/month")
      .then(res => res.json())
      .then(data => {
        const labels = data.map(d => d.date);
        const counts = data.map(d => d.count);

        new Chart(document.getElementById("monthlyChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: [{
              label: "月別アクセス数",
              data: counts,
              backgroundColor: "orange"
            }]
          }
        });
      });
  </script>

</body>
</html>
