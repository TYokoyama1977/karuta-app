<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>英語かるたアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: "Arial", sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      margin-top: 10px;
      font-size: 28px;
      color: #333;
    }
    .menu {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .menu button {
      width: 260px;
      padding: 14px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: #ffcc66;
      cursor: pointer;
    }
    .menu button:hover {
      background: #ffdd88;
    }
    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #666;
      padding-bottom: 20px;
    }
  </style>

  <script>
    function openContactForm() {
      alert("お問い合わせフォームは別の画面（タブ）で開きます。書き終わったら、その画面を閉じてホームに戻ってください。");
      window.open("https://docs.google.com/forms/あなたのフォームID/viewform", "_blank");
    }
  </script>
</head>
<body>

  <!-- ロゴ（画像名は必要に応じて変更） -->
  <img src="images/logo.png" alt="Studio OZ ロゴ"
       style="width:180px; margin-top:20px; margin-bottom:10px;">

  <h1>英語かるたアプリ</h1>

  <div class="menu">
    <button onclick="location.href='play.html'">🔊 読み上げ</button>
    <button onclick="location.href='settings.html'">⚙️ 設定</button>
    <button onclick="location.href='edit.html'">✏️ 単語編集</button>
    <button onclick="location.href='illustration.html'">🖼️ イラスト集</button>

    <button onclick="openContactForm()">📮 お問い合わせ</button>

    <!-- 子ども向けのやさしい説明文 -->
    <p style="font-size:12px; color:#666; margin-top:5px;">
      ※ お問い合わせフォームは <strong>別の画面（タブ）</strong> で開きます。<br>
      　書き終わったら、その画面を <strong>閉じるとホームに戻れます。</strong>
    </p>

    <button onclick="location.href='terms.html'">📃 利用規約</button>
    <button onclick="location.href='privacy.html'">🔒 プライバシーポリシー</button>
  </div>

  <footer>
    © 2026 Studio OZ<br>
    Version: 1.0.3
  </footer>

</body>
</html>
