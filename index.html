<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英語かるた読み上げアプリ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
/* 共通デザイン */
body{
    text-align:center;
    font-family:sans-serif;
    padding:20px;
    margin:0;
    background:#f7f7f7;
}

button{
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:active{
    background:#005fcc;
}

input, select{
    padding:8px;
    margin:5px;
}

#wordDisplay{
    margin-top:25px;
    color:#333;
    min-height:50px;
}

/* アコーディオン */
.accordion{
    width:90%;
    margin:10px auto;
    text-align:left;
}

.accordion-item{
    background:white;
    margin-bottom:10px;
    border-radius:8px;
    overflow:hidden;
    border:1px solid #ccc;
}

.accordion-header{
    padding:12px;
    font-size:18px;
    background:#eee;
    cursor:pointer;
}

.accordion-content{
    padding:10px;
    display:none;
    background:white;
    font-size:16px;
}

/* スマホ向け */
@media (max-width: 600px){
    h1{ font-size:6vw; }
    button{ font-size:5vw; width:80%; }
    input, select{ font-size:5vw; width:70%; }
    label{ font-size:4.5vw; }
    #wordDisplay{ font-size:10vw; }
}

/* PC向け */
@media (min-width: 601px){
    h1{ font-size:32px; }
    button{ font-size:20px; width:250px; }
    input, select{ font-size:18px; width:200px; }
    label{ font-size:18px; }
    #wordDisplay{ font-size:40px; }
}
    </style>
</head>
<body>

    <h1>英語かるた</h1>

    <!-- 単語追加欄 -->
    <div>
        <label>ジャンル：</label><br>
        <select id="genreSelect">
            <option value="果物">果物</option>
            <option value="動物">動物</option>
            <option value="昆虫">昆虫</option>
            <option value="文房具">文房具</option>
        </select>
        <br>

        <label>単語を追加：</label><br>
        <input type="text" id="addWordInput" placeholder="例：Orange">
        <button onclick="addWord()" style="background:#28a745;">＋ 追加</button>
    </div>

    <!-- 編集欄 -->
    <div style="margin-top:20px;">
        <label>編集するジャンル：</label><br>
        <select id="editGenreSelect">
            <option value="果物">果物</option>
            <option value="動物">動物</option>
            <option value="昆虫">昆虫</option>
            <option value="文房具">文房具</option>
        </select>
        <br>
        <label>修正する単語：</label><br>
        <select id="editWordSelect"></select>
        <br>
        <label>新しい単語：</label><br>
        <input type="text" id="editWordInput" placeholder="修正後の単語">
        <button onclick="editWord()" style="background:#ffc107;color:#000;">✎ 修正</button>
    </div>

    <hr>

    <!-- アコーディオン表示 -->
    <div id="wordList" class="accordion"></div>

    <hr>

    <!-- 再生設定 -->
    <div>
        <label>再生するジャンル：</label><br>
        <select id="playGenreSelect">
            <option value="果物">果物</option>
            <option value="動物">動物</option>
            <option value="昆虫">昆虫</option>
            <option value="文房具">文房具</option>
        </select>
    </div>

    <div>
        <label>再生間隔（秒）：</label><br>
        <input type="number" id="intervalInput" value="10" min="1">
    </div>

    <div>
        <label>速度（rate）：</label><br>
        <input type="number" id="rateInput" value="1" min="0.5" max="2" step="0.1">
    </div>

    <div>
        <label>声質（voice）：</label><br>
        <select id="voiceSelect"></select>
    </div>

    <button onclick="startAutoPlay()">▶ 自動再生スタート</button>
    <button onclick="stopAutoPlay()" style="background:#dc3545;">■ 停止</button>

    <div id="wordDisplay"></div>

    <script>
/* ★★★★★ ジャンルごとに単語を永続保存 ★★★★★ */

let saved = localStorage.getItem("words");
let words = saved ? JSON.parse(saved) : {
    "果物": ["Apple", "Banana", "Cherry"],
    "動物": ["Dog", "Elephant"],
    "昆虫": [],
    "文房具": []
};

let shuffled = [];
let index = 0;
let timerId = null;
let voices = [];

/* 声の一覧 */
function loadVoices(){
    voices = speechSynthesis.getVoices();
    const select = document.getElementById("voiceSelect");
    select.innerHTML = "";

    voices.forEach((v, i) => {
        const option = document.createElement("option");
        option.value = i;
        option.textContent = v.name + " (" + v.lang + ")";
        select.appendChild(option);
    });
}
speechSynthesis.onvoiceschanged = loadVoices;

/* アコーディオン表示 */
function updateWordList(){
    const container = document.getElementById("wordList");
    container.innerHTML = "";

    for(let genre in words){
        const item = document.createElement("div");
        item.className = "accordion-item";

        const header = document.createElement("div");
        header.className = "accordion-header";
        header.textContent = genre + " ▶";
        header.onclick = () => {
            content.style.display = content.style.display === "block" ? "none" : "block";
        };

        const content = document.createElement("div");
        content.className = "accordion-content";
        content.textContent = words[genre].join(", ");

        item.appendChild(header);
        item.appendChild(content);
        container.appendChild(item);
    }

    updateEditWordSelect();
}
updateWordList();

/* 単語追加 */
function addWord(){
    const input = document.getElementById("addWordInput");
    const genre = document.getElementById("genreSelect").value;
    const newWord = input.value.trim();

    if(newWord === ""){
        alert("単語を入力してください");
        return;
    }

    words[genre].push(newWord);
    localStorage.setItem("words", JSON.stringify(words));

    input.value = "";
    updateWordList();
    alert("単語を追加しました");
}

/* 編集用セレクト更新 */
function updateEditWordSelect(){
    const genre = document.getElementById("editGenreSelect").value;
    const select = document.getElementById("editWordSelect");
    select.innerHTML = "";

    words[genre].forEach((w, i) => {
        const option = document.createElement("option");
        option.value = i;
        option.textContent = w;
        select.appendChild(option);
    });
}

document.getElementById("editGenreSelect").addEventListener("change", updateEditWordSelect);

/* 単語修正 */
function editWord(){
    const genre = document.getElementById("editGenreSelect").value;
    const idx = document.getElementById("editWordSelect").value;
    const newWord = document.getElementById("editWordInput").value.trim();

    if(newWord === ""){
        alert("新しい単語を入力してください");
        return;
    }

    words[genre][idx] = newWord;
    localStorage.setItem("words", JSON.stringify(words));

    document.getElementById("editWordInput").value = "";
    updateWordList();
    alert("単語を修正しました");
}

/* シャッフル */
function shuffle(array){
    let a = array.slice();
    for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

/* 読み上げ */
function speakWord(word){
    document.getElementById("wordDisplay").textContent = word;

    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'en-US';
    utterance.rate = parseFloat(document.getElementById("rateInput").value);

    const voiceIndex = document.getElementById("voiceSelect").value;
    if(voices[voiceIndex]){
        utterance.voice = voices[voiceIndex];
    }

    speechSynthesis.speak(utterance);
}

/* 自動再生 */
function startAutoPlay(){
    if(timerId !== null) return;

    const genre = document.getElementById("playGenreSelect").value;
    const list = words[genre];

    if(list.length === 0){
        alert("このジャンルには単語がありません");
        return;
    }

    shuffled = shuffle(list);
    index = 0;

    speakWord(shuffled[index]);
    index++;

    const interval = parseInt(document.getElementById("intervalInput").value) * 1000;

    timerId = setInterval(() => {
        if(index >= shuffled.length){
            stopAutoPlay();
            alert("読み上げが終了しました");
            return;
        }

        speakWord(shuffled[index]);
        index++;
    }, interval);
}

/* 停止 */
function stopAutoPlay(){
    if(timerId !== null){
        clearInterval(timerId);
        timerId = null;
    }
    speechSynthesis.cancel();
}

updateEditWordSelect();
    </script>

</body>
</html>
