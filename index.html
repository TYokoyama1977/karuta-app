<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>英語かるたアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Arial", sans-serif;
      text-align: center;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
      font-size: 28px;
      color: #333;
    }

    .menu-container {
      margin-top: 40px;
    }

    .menu-btn {
      display: block;
      width: 70%;
      max-width: 300px;
      margin: 20px auto;
      padding: 25px;
      font-size: 22px;
      border-radius: 50px;
      border: none;
      background: #ffcc66;
      color: #333;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .menu-btn:hover {
      background: #ffdd88;
      cursor: pointer;
    }

    .contact-btn {
      margin-top: 30px;
      font-size: 18px;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      background: #66aaff;
      color: white;
    }

    .contact-btn:hover {
      background: #88bbff;
      cursor: pointer;
    }

    .version-text {
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>英語かるたアプリ</h1>

  <div class="menu-container">
    <button class="menu-btn" onclick="location.href='play.html'">🔊 読み上げ</button>
    <button class="menu-btn" onclick="location.href='edit.html'">✏️ 単語編集</button>
  </div>

  <!-- お問い合わせボタン -->
  <button class="contact-btn" onclick="openContactForm()">📮 お問い合わせ</button>

  <!-- バージョン表示 -->
  <p id="versionDisplay" class="version-text"></p>

  <script>
    const APP_VERSION = "v1.0.0"; // ← 必要に応じて更新
    document.getElementById("versionDisplay").textContent =
      "現在のバージョン：" + APP_VERSION;

    function openContactForm() {
      window.open(
        "https://docs.google.com/forms/d/e/1FAIpQLSfm4dHjCd3lNRaGQ_RKvO1gnrQYrf8wK0lYfmZq0Ma8IDemRQ/viewform?usp=header",
        "_blank"
      );
    }
  </script>

</body>
</html>
