<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>英語かるたアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Arial", sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      color: #333;
    }

    .menu {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .menu-btn {
      width: 250px;
      padding: 15px;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      background: #ffcc66;
      cursor: pointer;
    }

    .menu-btn:hover {
      background: #ffdd88;
    }

    .version {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

  <h1>英語かるたアプリ</h1>

  <div class="menu">
    <button class="menu-btn" onclick="openPlay()">🔊 読み上げ</button>
    <button class="menu-btn" onclick="openEdit()">✏️ 単語編集</button>
    <button class="menu-btn" onclick="openIllustration()">🖼️ イラスト集</button>
    <button class="menu-btn" onclick="openContactForm()">📮 お問い合わせ</button>
  </div>

  <p class="version" id="versionText">Version: 1.0.0</p>

  <script>
    function openPlay() {
      window.location.href = "play.html";
    }

    function openEdit() {
      window.location.href = "edit.html";
    }

    function openIllustration() {
      window.location.href = "illustration.html";
    }

    function openContactForm() {
      window.open("https://docs.google.com/forms/d/e/1FAIpQLSfm4dHjCd3lNRaGQ_RKvO1gnrQYrf8wK0lYfmZq0Ma8IDemRQ/viewform?usp=publish-editor");
    }

    // バージョン管理（自動更新）
    let version = localStorage.getItem("appVersion") || "1.0.0";
    document.getElementById("versionText").textContent = "Version: " + version;
  </script>

</body>
</html>
