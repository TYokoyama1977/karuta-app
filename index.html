<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>英語かるたアプリ</title>
<style>
body {
    text-align: center;
    font-family: sans-serif;
    padding: 50px;
    margin: 0;
    /* 🌈 シンプルで優しいグラデーション背景 */
    background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
}

h1 {
    font-size: 32px;
    margin-bottom: 40px;
    color: #333;
}

button {
    font-size: 24px;
    padding: 20px 40px;
    margin: 20px;
    cursor: pointer;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 10px;
    transition: 0.2s;
}

button:hover {
    background: #005fcc;
}
</style>
</head>
<body>

<h1>英語かるたアプリ</h1>

<button onclick="location.href='play.html'">読み上げを開始</button>
<button onclick="location.href='edit.html'">単語を編集</button>

</html>
