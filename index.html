<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>英語かるたアプリ</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Hiragino Sans", sans-serif;
    text-align: center;

    /* 🌈 やさしいパステル背景 */
    background: linear-gradient(135deg, #fceff9 0%, #e8f6ff 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* タイトル */
h1 {
    font-size: 36px;
    margin-bottom: 10px;
    color: #444;
}

/* タイトル下のアクセントライン */
.accent {
    width: 120px;
    height: 6px;
    background: #ffb6e1;
    margin: 0 auto 40px auto;
    border-radius: 3px;
}

/* ボタンをカード風に */
button {
    font-size: 22px;
    padding: 18px 40px;
    margin: 15px;
    cursor: pointer;
    background: white;
    color: #444;
    border: none;
    border-radius: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: 0.2s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>英語かるたアプリ</h1>
<div class="accent"></div>

<button onclick="location.href='play.html'">読み上げを開始</button>
<button onclick="location.href='edit.html'">単語を編集</button>

</body>
</html>
