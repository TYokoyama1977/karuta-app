<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>印刷ページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      background: #fff;
    }

    h1 {
      margin: 10px 0;
      font-size: 22px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 200px);
      grid-template-rows: repeat(3, 300px);
      width: 600px;
      height: 900px;
      margin: 0 auto;
      padding: 0;

      /* 正しい点線格子（縦200px・横300px） */
      background-image:
        repeating-linear-gradient(
          to bottom,
          #000 0 2px,
          transparent 2px 6px
        ),
        repeating-linear-gradient(
          to right,
          #000 0 2px,
          transparent 2px 6px
        );
      background-size:
        200px 100%,
        100% 300px;
      background-position:
        0 0,
        0 0;
    }

    .card {
      width: 192px;
      height: 285px;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      justify-self: center;
      align-self: center;
      page-break-inside: avoid;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ボタン配置 */
    .nav-buttons {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      z-index: 999;
    }

    .nav-buttons button {
      padding: 8px 14px;
      font-size: 14px;
      border: 1px solid #333;
      background: #fff;
      cursor: pointer;
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }
      h1 {
        display: none;
      }
      .nav-buttons {
        display: none;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
    }
  </style>
</head>
<body>

  <div class="nav-buttons">
    <button onclick="location.href='index.html'">ホームに戻る</button>
    <button onclick="history.back()">1つ前に戻る</button>
  </div>

  <h1 id="title"></h1>

  <div class="card-grid" id="grid"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const genre = params.get("genre");

    const data = {
      "Number": ["one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve"],
      "Animal": ["dog","cat","bird","fish","rabbit","bear","lion","horse"],
      "Color": ["red","blue","yellow","green","black","white","pink","purple"],
      "Food": ["bread","rice","milk","egg","soup","cake","cheese","juice"],
      "Fruit": ["apple","banana","orange","grape","peach","lemon","melon","strawberry"],
      "Body": ["head","hand","foot","eye","ear","nose","mouth","hair"],
      "Insect": ["ant","bee","butterfly","beetle","spider","dragonfly","ladybug","grasshopper"],
      "Other": ["car","house","book","chair","clock","cup","ball","star"]
    };

    document.getElementById("title").textContent = genre;

    const grid = document.getElementById("grid");

    data[genre].forEach(word => {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");

      if (genre === "Animal" && ["dog","cat","bird","rabbit","lion","bear"].includes(word)) {
        img.src = `images/animal/${word}.png`;
      } else {
        img.src = `img/${word}.png`;
      }

      card.appendChild(img);
      grid.appendChild(card);
    });
  </script>

</body>
</html>
