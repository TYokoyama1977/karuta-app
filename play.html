<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読み上げ - 読み上げかるた</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
    h1 { font-size: 26px; margin-bottom: 10px; }
    .page-header { text-align: left; margin-bottom: 10px; }
    .home-btn {
      font-size: 18px; padding: 8px 14px;
      border-radius: 8px; border: none;
      background: #eee; cursor: pointer;
    }
    .home-btn:hover { background: #ddd; }

    .word-box {
      margin: 20px auto;
      font-size: 40px;
      font-weight: bold;
      padding: 20px;
      border-radius: 12px;
      background: #fff3cd;
      width: 80%;
    }

    .controls button {
      font-size: 20px;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc66;
      cursor: pointer;
    }
    .controls button:hover { background: #ffdd88; }

  </style>
</head>
<body>

<div class="page-header">
  <button class="home-btn" onclick="location.href='index.html'">🏠 ホームへ戻る</button>
</div>

<h1>読み上げ</h1>

<div class="word-box" id="currentWord">---</div>

<div class="controls">
  <button onclick="nextWord()">▶ 次の単語</button>
  <button onclick="toggleAutoPlay()">⏱ 自動再生</button>
</div>

<script src="play.js"></script>

</body>
</html>
