<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>読み上げ</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .genreBox { margin-bottom: 10px; }
        #displayWord { font-size: 40px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h2>読み上げ</h2>

<div class="genreBox">
    <label><input type="checkbox" value="number" onchange="updateWordList()"> Number</label>
    <label><input type="checkbox" value="animal" onchange="updateWordList()"> Animal</label>
    <label><input type="checkbox" value="fruit" onchange="updateWordList()"> Fruit</label>
    <label><input type="checkbox" value="color" onchange="updateWordList()"> Color</label>
    <label><input type="checkbox" value="insect" onchange="updateWordList()"> Insect</label>
    <label><input type="checkbox" value="other" onchange="updateWordList()"> Other</label>
</div>

<div id="wordCount">選択中の単語数: 0 個</div>
<div id="remainingCount">残り: 0 個</div>

<button onclick="nextWord()">次の単語を読み上げ</button>

<div id="displayWord">---</div>

<br><br>
<a href="index.html">ホームに戻る</a>

<script>
let words = JSON.parse(localStorage.getItem("words"));
let remainingWords = [];

function getSelectedGenres() {
    return [...document.querySelectorAll("input[type=checkbox]:checked")].map(cb => cb.value);
}

function updateWordList() {
    const selected = getSelectedGenres();
    let allWords = [];

    selected.forEach(g => allWords = allWords.concat(words[g]));

    remainingWords = shuffleArray(allWords);

    document.getElementById("wordCount").textContent =
        `選択中の単語数: ${allWords.length} 個`;

    document.getElementById("remainingCount").textContent =
        `残り: ${remainingWords.length} 個`;
}

function nextWord() {
    if (remainingWords.length === 0) {
        speak("No more words");
        document.getElementById("displayWord").textContent = "終了";
        return;
    }

    const word = remainingWords.shift();
    speak(word);

    document.getElementById("displayWord").textContent = word;

    document.getElementById("remainingCount").textContent =
        `残り: ${remainingWords.length} 個`;
}

function speak(text) {
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = "en-US";
    speechSynthesis.speak(uttr);
}

function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
</script>

</body>
</html>
