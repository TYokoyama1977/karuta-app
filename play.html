<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み上げ</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #fff8e7;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      background-color: #ffcc66;
      color: #333;
      padding: 15px;
      margin: 0;
      font-size: 24px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .genre-selection {
      margin-top: 20px;
    }

    .genre-icons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 10px;
    }

    .genre {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .genre img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      background-color: #fff;
    }

    .genre:hover {
      transform: scale(1.1);
    }

    .genre p {
      margin-top: 8px;
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .controls {
      margin-top: 30px;
    }

    button {
      background-color: #66cc99;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #55aa88;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>読み上げ</h1>

  <div class="genre-selection">
    <h2>ジャンルを選択</h2>
    <div class="genre-icons">
      <div class="genre"><img src="images/animal_icon.png" alt="Animal"><p>動物</p></div>
      <div class="genre"><img src="images/number_icon.png" alt="Number"><p>数字</p></div>
      <div class="genre"><img src="images/fruit_icon.png" alt="Fruit"><p>果物</p></div>
      <div class="genre"><img src="images/color_icon.png" alt="Color"><p>色</p></div>
      <div class="genre"><img src="images/insect_icon.png" alt="Insect"><p>昆虫</p></div>
      <div class="genre"><img src="images/other_icon.png" alt="Other"><p>その他</p></div>
    </div>
  </div>

  <div class="controls">
    <button id="playButton">自動再生 ON</button>
    <div class="status" id="statusText">ジャンルを選んでください</div>
  </div>

  <script>
    const playButton = document.getElementById("playButton");
    const statusText = document.getElementById("statusText");
    let autoPlay = false;

    playButton.addEventListener("click", () => {
      autoPlay = !autoPlay;
      playButton.textContent = autoPlay ? "自動再生 OFF" : "自動再生 ON";
      playButton.style.backgroundColor = autoPlay ? "#66cc99" : "#aaa";
      statusText.textContent = autoPlay ? "自動再生モードです" : "手動モードです";
    });

    document.querySelectorAll(".genre").forEach(genre => {
      genre.addEventListener("click", () => {
        const name = genre.querySelector("p").textContent;
        statusText.textContent = `${name}ジャンルを選択しました`;
      });
    });
  </script>
</body>
</html>
