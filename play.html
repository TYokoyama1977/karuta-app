<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>読み上げ</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        #currentWord {
            font-size: 40px;
            margin: 20px 0;
        }

        /* 自動再生ボタンの色 */
        #autoPlayBtn {
            padding: 8px 16px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        /* ON（緑） */
        .on {
            background-color: #4CAF50;
        }

        /* OFF（灰） */
        .off {
            background-color: #888;
        }
    </style>
</head>
<body>

<h1>読み上げ</h1>

<div id="currentWord">cat</div>

<button onclick="speakCurrent()">読み上げる</button>
<button onclick="nextWord()">次の単語</button>

<h3>ジャンルを選択</h3>
<select id="genreSelect" onchange="loadWords()">
    <option value="動物">動物</option>
    <option value="数字">数字</option>
    <option value="体">体</option>
    <option value="色">色</option>
    <option value="日常品">日常品</option>
    <option value="その他">その他</option>
</select>

<h3>読み上げ速度</h3>
<input type="number" id="rateInput" step="0.1" min="0.5" max="2" value="1">

<h3>読み上げ間隔（秒）</h3>
<input type="number" id="intervalInput" min="1" max="20" value="6">
<span id="intervalLabel">6 秒</span>

<br><br>

<!-- ★ 自動再生ボタン（色付き） -->
<button id="autoPlayBtn" onclick="toggleAutoPlay()">自動再生: OFF</button>

<br><br>
<a href="index.html">ホームに戻る</a>

<script>
    // 単語データ（edit.html と共有）
    let words = JSON.parse(localStorage.getItem("words")) || {
        "動物": [],
        "数字": [],
        "体": [],
        "色": [],
        "日常品": [],
        "その他": []
    };

    let currentWords = [];
    let currentIndex = 0;

    // 自動再生状態
    let autoPlay = JSON.parse(localStorage.getItem("autoPlay")) || false;

    // 読み上げ
    function speak(text) {
        const rate = parseFloat(document.getElementById("rateInput").value);
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.rate = rate;
        speechSynthesis.speak(uttr);
    }

    function speakCurrent() {
        const text = document.getElementById("currentWord").textContent;
        speak(text);
    }

    // 次の単語
    function nextWord() {
        if (currentIndex >= currentWords.length) {
            alert("これ以上単語がありません");
            return;
        }

        const word = currentWords[currentIndex];
        document.getElementById("currentWord").textContent = word;
        currentIndex++;

        // ★ 次の単語をクリックしたら読み上げる
        speak(word);

        // ★ 自動再生が ON のときは次も自動で読む
        if (autoPlay) {
            const interval = parseInt(document.getElementById("intervalInput").value) * 1000;
            setTimeout(nextWord, interval);
        }
    }

    // ジャンル読み込み
    function loadWords() {
        const genre = document.getElementById("genreSelect").value;
        currentWords = words[genre];
        currentIndex = 0;
        if (currentWords.length > 0) {
            document.getElementById("currentWord").textContent = currentWords[0];
        }
    }

    // 自動再生ボタンの表示更新
    function updateAutoPlayButton() {
        const btn = document.getElementById("autoPlayBtn");
        btn.textContent = "自動再生: " + (autoPlay ? "ON" : "OFF");

        if (autoPlay) {
            btn.classList.remove("off");
            btn.classList.add("on");
        } else {
            btn.classList.remove("on");
            btn.classList.add("off");
        }
    }

    // 自動再生 ON/OFF 切り替え
    function toggleAutoPlay() {
        autoPlay = !autoPlay;
        localStorage.setItem("autoPlay", JSON.stringify(autoPlay));
        updateAutoPlayButton();
    }

    // 読み上げ間隔の表示更新
    document.getElementById("intervalInput").oninput = () => {
        document.getElementById("intervalLabel").textContent =
            document.getElementById("intervalInput").value + " 秒";
    };

    // 初期化
    window.onload = () => {
        loadWords();
        updateAutoPlayButton();
    };
</script>

</body>
</html>
