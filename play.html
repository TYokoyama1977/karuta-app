<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>読み上げ - 英語かるたアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Arial", sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    /* 上部ヘッダー */
    .play-header {
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .home-btn, .edit-btn {
      font-size: 18px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #eee;
    }

    /* タブ */
    .tab-buttons {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    .tab-btn {
      padding: 12px 20px;
      margin: 0 5px;
      border: none;
      border-radius: 8px;
      background: #ddd;
      font-size: 18px;
    }

    .tab-btn.active {
      background: #ffcc66;
    }

    .tab-content {
      display: none;
      margin-top: 20px;
    }

    .tab-content.active {
      display: block;
    }

    /* ジャンルアイコン */
    .genre-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
    }

    .genre {
      width: 90px;
      text-align: center;
      cursor: pointer;
    }

    .genre img {
      width: 70px;
      height: 70px;
    }

    .genre.selected {
      border: 3px solid #ffcc66;
      border-radius: 10px;
      padding: 5px;
      background: #fff;
    }

    /* 読み上げタブの上部ボタン */
    .reading-header {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .top-btn {
      font-size: 18px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #eee;
    }

    #autoPlayToggle.auto-on {
      background: #4CAF50;
      color: white;
    }

    #autoPlayToggle.auto-off {
      background: #aaa;
      color: white;
    }

    /* 単語表示 */
    #currentWord {
      font-size: 40px;
      margin-top: 30px;
      color: #333;
    }

    /* ボタン */
    .main-btn {
      margin-top: 20px;
      padding: 20px 40px;
      font-size: 22px;
      border-radius: 50px;
      border: none;
      background: #ffcc66;
    }

    .main-btn:hover {
      background: #ffdd88;
    }

    /* 設定タブ */
    .settings {
      margin-top: 20px;
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .setting-item {
      margin-top: 10px;
      font-size: 18px;
    }

    .setting-item input[type=range] {
      width: 70%;
    }
  </style>
</head>

<body>

  <!-- 上部ヘッダー -->
  <div class="play-header">
    <button id="homeButton" class="home-btn">🏠 ホームに戻る</button>
    <button id="editButton" class="edit-btn">✏️ 単語編集へ</button>
  </div>

  <!-- タブ切り替え -->
  <div class="tab-buttons">
    <button class="tab-btn active" data-tab="readTab">🔊 読み上げ</button>
    <button class="tab-btn" data-tab="settingTab">⚙️ 設定</button>
  </div>

  <!-- 読み上げタブ -->
  <div id="readTab" class="tab-content active">

    <!-- ジャンル選択（アイコン） -->
    <div class="genre-icons">
      <div class="genre selected" data-genre="Number">
        <img src="images/number_icon.png"><p>Number</p>
      </div>
      <div class="genre selected" data-genre="Animal">
        <img src="images/animal_icon.png"><p>Animal</p>
      </div>
      <div class="genre selected" data-genre="Fruit">
        <img src="images/fruit_icon.png"><p>Fruit</p>
      </div>
      <div class="genre selected" data-genre="Color">
        <img src="images/color_icon.png"><p>Color</p>
      </div>
      <div class="genre selected" data-genre="Insect">
        <img src="images/insect_icon.png"><p>Insect</p>
      </div>
      <div class="genre selected" data-genre="Other">
        <img src="images/other_icon.png"><p>Other</p>
      </div>
      <div class="genre selected" data-genre="Food">
        <img src="images/food_icon.png"><p>Food</p>
      </div>
      <div class="genre selected" data-genre="Body">
        <img src="images/body_icon.png"><p>Body</p>
      </div>
    </div>

    <div class="reading-header">
      <button id="pauseButton" class="top-btn">⏸ ポーズ</button>
      <button id="autoPlayToggle" class="top-btn auto-off">自動再生 OFF</button>
    </div>

    <div id="currentWord">---</div>

    <button id="nextWordBtn" class="main-btn">次の単語</button>

    <p id="remainingCount">残り：0</p>

    <button id="shuffleResetBtn" class="main-btn">🔄 シャッフルして最初から</button>
  </div>

  <!-- 設定タブ -->
  <div id="settingTab" class="tab-content">

    <div class="settings">
      <h3>読み上げ設定</h3>

      <div class="setting-item">
        <label>読み上げ速度: </label>
        <span id="rateValue">1</span>
        <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
      </div>

      <div class="setting-item">
        <label>読み上げ間隔（秒）: </label>
        <span id="intervalValue">6</span>
        <input type="range" id="intervalSlider" min="1" max="10" step="1" value="6">
      </div>
    </div>

  </div>

  <script>
    // 画面遷移
    homeButton.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    editButton.addEventListener("click", () => {
      window.location.href = "edit.html";
    });

    // タブ切り替え
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    // 読み上げ設定
    rateSlider.addEventListener("input", () => {
      rateValue.textContent = rateSlider.value;
    });

    intervalSlider.addEventListener("input", () => {
      intervalValue.textContent = intervalSlider.value;
    });

    // 読み上げ機能
    let words = [];
    let shuffled = [];
    let index = 0;
    let isPaused = false;
    let autoPlay = false;

    // ジャンル選択（アイコン）
    document.querySelectorAll(".genre").forEach(g => {
      g.addEventListener("click", () => {
        g.classList.toggle("selected");
        loadWords();
      });
    });

    function loadWords() {
      const data = JSON.parse(localStorage.getItem("wordsData") || "{}");
      words = [];

      const selectedGenres = [...document.querySelectorAll(".genre.selected")]
        .map(g => g.dataset.genre);

      selectedGenres.forEach(genre => {
        if (data[genre]) words.push(...data[genre]);
      });

      shuffleWords();
    }

    function shuffleWords() {
      shuffled = [...words];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      index = 0;
      updateRemaining();
      currentWord.textContent = "---";
    }

    function updateRemaining() {
      remainingCount.textContent = "残り：" + (shuffled.length - index);
    }

    function speakWord(word) {
      const uttr = new SpeechSynthesisUtterance(word);
      uttr.rate = parseFloat(rateSlider.value);
      speechSynthesis.speak(uttr);
    }

    nextWordBtn.addEventListener("click", () => {
      if (index >= shuffled.length) return;

      const word = shuffled[index];
      currentWord.textContent = word;
      speakWord(word);

      index++;
      updateRemaining();
    });

    // ポーズ
    pauseButton.addEventListener("click", () => {
      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? "▶ 再開" : "⏸ ポーズ";
      if (isPaused) speechSynthesis.pause();
      else speechSynthesis.resume();
    });

    // 自動再生
    autoPlayToggle.addEventListener("click", () => {
      autoPlay = !autoPlay;
      if (autoPlay) {
        autoPlayToggle.textContent = "自動再生 ON";
        autoPlayToggle.classList.add("auto-on");
        autoPlayToggle.classList.remove("auto-off");
        autoPlayLoop();
      } else {
        autoPlayToggle.textContent = "自動再生 OFF";
        autoPlayToggle.classList.add("auto-off");
        autoPlayToggle.classList.remove("auto-on");
      }
    });

    function autoPlayLoop() {
      if (!autoPlay || isPaused) return;

      nextWordBtn.click();

      if (index < shuffled.length) {
        setTimeout(autoPlayLoop, intervalSlider.value * 1000);
      }
    }

    shuffleResetBtn.addEventListener("click", loadWords);

    // 初回読み込み
    loadWords();
  </script>

</body>
</html>
